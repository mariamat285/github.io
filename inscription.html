<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <fieldset>
        <legend>Information</legend>
        <form action=""></form>
            <fieldset>
                <legend>Information de connexion</legend>
                <table>
                    <tr>
                        <td><label for="">Adresse electronique</label></td>
                        <td><input type="email" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">Mot de passe:</label></td>
                        <td><input type="password" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">Entrer à nouveau le mot de passe:</label></td>
                        <td><input type="password" name="" id=""></td>
                    </tr>
                </table>
            </fieldset>
            <br>
            <fieldset>
                <legend>Information personnelle</legend>
                <table>
                    <tr>
                        <td><label for="">Prénom:</label></td>
                        <td><input type="text" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">nom:</label></td>
                        <td><input type="text" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">Adresse:</label></td>
                        <td><input type="texte" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">Ville:</label></td>
                        <td>
                            <input type="texte" name="" id="">
                            <label for="">Code postal:</label>
                            <input type="number" name="" id="">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="">Genre:</label></td>
                        <td>
                            <input type="radio" name="a" id=""><label for="">M</label>
                            <input type="radio" name="a" id=""><label for="">F</label>
                        </td>
                    </tr>
                </table>
            </fieldset>
            <br>
            <fieldset>
            <legend>Information de carte de crédit</legend>
            <table>
                <tr>
                    <td><label for="">Type de carte :</label></td>
                        <td>
                            <input type="checkbox" name="select"> <label for="">MasterCard</label><br>
                            <input type="checkbox" name="select"> <label for="">Visa</label>
                        </td>
                </tr>
                <tr>
                    <td><label for="">Numéro de carte</label></td>
                    <td><input type="number"></td>
                </tr>
                <tr>
                    <td><label for="">Date d'expiration</td>
                    <td><input type="date"></td>
                </tr>

            </table>
          </fieldset>
        </form>
    </fieldset>
</body>
</html>
